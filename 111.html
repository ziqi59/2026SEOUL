            const [svgHtml, setSvgHtml] = useState("");
            useEffect(() => {
                let mounted = true;
                const renderIcon = () => {
                    if (!window.lucide || !window.lucide.icons) { setTimeout(renderIcon, 50); return; }
                    const iconMap = {
                        "Flight": "Plane", "MapIcon": "Map", "ImageIcon": "Image",
                        "Transport": "Train", "Sightseeing": "Star", "Food": "Utensils",
                        "Shopping": "ShoppingBag", "Layout": "Layout", "Ticket": "Ticket",
                        "Hotel": "Hotel", "ShoppingBag": "ShoppingBag", "Bus": "Bus",
                        "Tag": "Tag", "Check": "Check", "X": "X", "Link": "ExternalLink",
                        "Navigation": "Navigation", "Info": "Info", "User": "User", "MapPin": "MapPin", "Map": "Map",
                        "QrCode": "QrCode", "Camera": "Camera", "Sparkles": "Sparkles"
                    };
                    const targetName = iconMap[name] || name;
                    const kebabName = targetName.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const iconObj = window.lucide.icons[targetName] || window.lucide.icons[kebabName];
                    if (iconObj && typeof iconObj.toSvg === 'function' && mounted) { setSvgHtml(iconObj.toSvg({ width: size, height: size, class: className, 'stroke-width': 2 })); }
                };
                renderIcon(); return () => { mounted = false; };
            }, [name, size, className]);
            return <span className="lucide-icon-wrapper flex items-center justify-center shrink-0" dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        const WeatherDisplay = ({ lat, lon }) => {
            const [weather, setWeather] = useState({ temp: '--', icon: '☼' });
            const fetchWeather = async (retryCount = 0) => {
                try {
                    await new Promise(resolve => setTimeout(resolve, Math.random() * 500));
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    if (!res.ok) throw new Error("API Limit");
                    const data = await res.json();
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day;
                    let icon = isDay === 1 ? '☼' : '☾';
                    if ([1, 2, 3, 45, 48].includes(code)) icon = '༄';
                    if ([51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code)) icon = '⛈︎';
                    if ([71, 73, 75, 77, 85, 86].includes(code)) icon = '❅';
                    setWeather({ temp: `${temp}°C`, icon });
                } catch (e) {
                    if (retryCount < 2) setTimeout(() => fetchWeather(retryCount + 1), 3000);
                }
            };
            useEffect(() => { fetchWeather(); }, [lat, lon]);
            return (
                <div className="flex flex-col items-end border-l pl-2 border-[#646464]/20 shrink-0 text-[#646464]">
                    <span className="text-sm leading-none mb-0.5 text-[#767fa5]">{weather.icon}</span>
                    <span className="text-[10px] font-mono tracking-tighter font-semibold">{weather.temp}</span>

            // 6/23 DAY 7
            { id: '23_1', dateIndex: 6, startTime: '白天', name: '聖水洞時尚逛街採購行程', address: '聖水洞商圈選品店', category: 'Shopping', note: '全天預留給聖水洞大採購服飾、彩妝與最後伴手禮補貨！' },
            { id: '23_2', dateIndex: 6, startTime: '午餐', name: '聖水洞周邊精選美食', address: '聖水商圈餐廳', category: 'Food', note: '美食候補口袋名單：jojo 刀削麵、安木 或是 無垢屋 (Mugoo)' },
            { id: '23_3', dateIndex: 6, startTime: '19:00', name: '男友飯店報告 (長輩可繼續逛)', address: '東大門住宿 / 聖水', category: 'Transport', note: '⚠️ 19:00 - 20:00 男友羅需要回東大門住宿線上報告！其他人如果體力夠可以留在商圈繼續逛街' },
            { id: '23_4', dateIndex: 6, startTime: '20:00', name: '晚餐：民宿叫外送韓式炸雞', address: '東大門住宿', category: 'Food', note: '最後一晚在房間圍坐，叫橋村炸雞或 BHC 外送開派對！' },
            { id: '23_5', dateIndex: 6, startTime: '深夜', name: '最後大清點！收拾打包行李', address: '東大門住宿', category: 'Hotel', note: '清點戰利品避免超重，將退稅單據另外整理好。' },
            // 6/24 DAY 8
            { id: '24_1', dateIndex: 7, startTime: '上午', name: '整理行李準備前往仁川機場', address: '東大門飯店', category: 'Transport', note: '退房，建議提早 3.5 小時前往機場二航辦理退稅與大件行李託運' },
            { id: '24_2', dateIndex: 7, startTime: '12:45', name: '搭乘中華航空 CI0161 班機返台', address: '首爾仁川二航', category: 'Flight', note: '12:45 - 14:20 飛抵台北一航。訂位代號: EBX8K6\n機票兩天前記得上網選位。平安回家！' }
        ];

        const staysData = [
            { name: '弘大設計感優質公寓民宿 (前4晚)', period: '6/17 - 6/21 (4晚)', checkIn: '15:00', checkOut: '11:00', distance: '🚇 地鐵弘益大學站 2 號線', mapUrl: 'https://naver.me/FSv6KH9W', note: '地址：首尔特别市 麻浦区 东桥洞 152-4。走樓梯只需 3 分鐘，若是搬運行李大隊，強力推薦繞行電梯路線約 9 分鐘。' },
            { name: '東大門便利景觀旅宿 (後3晚)', period: '6/21 - 6/24 (3晚)', checkIn: '15:00', checkOut: '11:00', distance: '🚇 地鐵東大門歷史文化公園站', note: '地址：14 Toegye-ro 68-gil, Gwanghui-dong, Jung-gu。手扶梯出口步行僅 5 分鐘即達，完全不操長輩腳力。' }
        ];

        const shoppingMasterData = [
            { id: 'k1', name: 'Tamburins 經典潤膚 / 固體香膏', category: '彩妝保養', intro: 'Jennie代言標誌性設計，金鍊護手霜與高級感香水', store: '聖水洞旗艦店 / 現代百貨', purchased: false },
            { id: 'k2', name: 'Olive Young 護膚與縮毛孔面膜', category: '彩妝保養', intro: 'Torriden微分子玻尿酸精華、Mediheal面膜、Unove高修護髮油', store: '弘大 / 東大門各大門市', purchased: false },
            { id: 'k3', name: 'HBAF 各式風味杏仁果包裝', category: '零食伴手禮', intro: '蜂蜜奶油、芥末、烤玉米口味，長輩親友送禮萬用包', store: '蠶室樂天超市 / 東大門大賣場', purchased: false },
            { id: 'k4', name: '韓國頂級海苔酥 / 真空包裝手工泡菜', category: '零食伴手禮', intro: '拌飯必備伴手脆海苔，泡菜切記需買全真空密封包才能安全託運', store: '樂天百貨地下食品街', purchased: false },
            { id: 'k5', name: 'Mardi Mercredi 經典小雛菊系列服飾', category: '潮流服飾', intro: '最代表首爾當代街頭的大學T與休閒衛衣短袖', store: '聖水洞選品店', purchased: false }
        ];

        // --- 3. App 主組件 ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('itinerary');
            const [expandedDateIndex, setExpandedDateIndex] = useState(null);
            const [activeShopCategory, setActiveShopCategory] = useState('彩妝保養');
            const [newShopItemName, setNewShopItemName] = useState('');
            const [showBackup, setShowBackup] = useState(false);
            const STORAGE_SHOP = 'seoul_trip_morandi_v3';
            const [shoppingItems, setShoppingItems] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_SHOP);
                    if (!saved) return shoppingMasterData;
                    const items = JSON.parse(saved);
                    shoppingMasterData.forEach(d => { if (!items.some(c => c.id === d.id)) items.push(d); });
                    return items;
                } catch (e) { return shoppingMasterData; }
            });
            useEffect(() => {
                try { localStorage.setItem(STORAGE_SHOP, JSON.stringify(shoppingItems)); } catch (e) { }
            }, [shoppingItems]);
            const togglePurchased = (id) => setShoppingItems(shoppingItems.map(si => si.id === id ? { ...si, purchased: !si.purchased } : si));
            const deleteShopItem = (id) => setShoppingItems(shoppingItems.filter(si => si.id !== id));
            const handleAddShopItem = (e) => {
                e.preventDefault();
                if (!newShopItemName.trim()) return;
                const newItem = { id: Date.now(), name: newShopItemName, category: activeShopCategory, purchased: false, intro: '手動新增項目', store: '首爾商圈' };
                setShoppingItems([...shoppingItems, newItem]);
                setNewShopItemName('');
            };
            const sortedDayTrips = (dayItems) => {
                return [...dayItems].sort((a, b) => {
                    const getWeight = (t) => {
                        if (t === '早午餐' || t === '午餐' || t === '中午') return '12:00';
                        if (t === '晚餐') return '18:00';
                        if (t === '住宿' || t === '晚上') return '23:59';
                        if (t && t.includes('-')) { t = t.split('-')[0].trim(); }
                        if (t && t.includes(':')) {
                            const parts = t.split(':');
                            return `${parts[0].padStart(2, '0')}:${parts[1]}`;
                        }
                        return t || '00:00';
                    };
                    return getWeight(a.startTime).localeCompare(getWeight(b.startTime));
                });
            };
            return (
                <div className="w-full min-h-screen bg-[#767fa5] relative overflow-hidden flex flex-col grain-overlay sm:rounded-2xl border border-[#eeeeee]/20 shadow-2xl">
                    <div className="absolute inset-0 pointer-events-none opacity-[0.08] dot-grid z-0"></div>
                    {/* --- 置頂固定導覽區 --- */}
                    <header className="sticky top-0 bg-[#767fa5]/90 backdrop-blur-xl z-50 border-b border-[#eeeeee]/20 p-4 pb-3 text-white shrink-0 shadow-md">
                        <div className="flex justify-between items-center px-1">
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-white">8天7夜 首爾家族旅程</h1>
                                <p className="text-[10px] text-[#d7dce7] font-semibold tracking-wider mt-0.5">家族尺寸：重量多選 ~ 7人</p>
                            </div>
                            <div className="w-14 h-14 rounded-full overflow-hidden border-2 border-[#eeeeee] shadow-md shrink-0 bg-white">
                                <img
                                    src="https://lh3.googleusercontent.com/d/1Zz2oiQbRp3MHR0Itm558k-f8qawoI4BP"
                                    className="w-full h-full object-cover object-center"
                                    alt="家族7人Q版大合照"
                                />
                            </div>
                        </div>
                        <div className="grid grid-cols-4 gap-1.5 mt-3">
                            <button onClick={() => setCurrentTab('itinerary')} className={`py-1.5 rounded-md border text-center transition-all text-xs font-bold ${currentTab === 'itinerary' ? 'bg-[#d7dce7] text-[#646464] border-[#eeeeee] shadow-sm scale-102' : 'bg-white/10 text-white/80 border-white/10 active:bg-white/20'}`}>行程</button>
                            <button onClick={() => setCurrentTab('tickets')} className={`py-1.5 rounded-md border text-center transition-all text-xs font-bold ${currentTab === 'tickets' ? 'bg-[#d7dce7] text-[#646464] border-[#eeeeee] shadow-sm scale-102' : 'bg-white/10 text-white/80 border-white/10 active:bg-white/20'}`}>票券</button>
                            <button onClick={() => setCurrentTab('stay')} className={`py-1.5 rounded-md border text-center transition-all text-xs font-bold ${currentTab === 'stay' ? 'bg-[#d7dce7] text-[#646464] border-[#eeeeee] shadow-sm scale-102' : 'bg-white/10 text-white/80 border-white/10 active:bg-white/20'}`}>住宿</button>
                            <button onClick={() => setCurrentTab('shopping')} className={`py-1.5 rounded-md border text-center transition-all text-xs font-bold ${currentTab === 'shopping' ? 'bg-[#d7dce7] text-[#646464] border-[#eeeeee] shadow-sm scale-102' : 'bg-white/10 text-white/80 border-white/10 active:bg-white/20'}`}>購物</button>
                        </div>
                    </header>
                    {/* --- 主內容滾動區 --- */}
                    <main className="flex-1 p-4 overflow-y-auto no-scrollbar relative z-10 animate-fade-in text-[#646464]">
                        {/* 1. 行程分頁 */}
                        {currentTab === 'itinerary' && (
                            <div className="space-y-3">
                                {dates.map((d, i) => {
                                    const isExpanded = expandedDateIndex === i;
                                    return (
                                        <div key={i} className="bg-white border rounded-xl shadow-sm overflow-hidden border-[#eeeeee]">
                                            <button onClick={() => setExpandedDateIndex(isExpanded ? null : i)} className="w-full p-3.5 flex items-center gap-3 text-left active:bg-slate-50 transition-all text-[#646464]">
                                                <div className="w-10 h-10 bg-[#767fa5] flex flex-col items-center justify-center rounded-md shrink-0 shadow-xs">
                                                    <span className="text-[8px] font-bold text-[#d7dce7] uppercase mb-0.5">{d.weekday}</span>
                                                    <span className="text-sm font-bold text-white leading-none font-mono">{d.date.split('/')[1]}</span>
                                                </div>
                                                <div className="flex-1 font-bold text-[13px] text-[#646464] tracking-tight">{d.title}</div>
                                                <WeatherDisplay lat={d.loc.lat} lon={d.loc.lon} />
                                                <Icon name={isExpanded ? "ChevronUp" : "ChevronDown"} size={14} className="opacity-60 text-[#767fa5]" />
                                            </button>
                                            {isExpanded && (
                                                <div className="px-4 pb-4 space-y-4 border-t border-[#eeeeee] pt-3 animate-fade-in bg-slate-50/50">
                                                    {sortedDayTrips(defaultTripData.filter(t => t.dateIndex === i)).map((trip, idx) => {
                                                        const isFood = trip.category === 'Food';
                                                        const isBackup = trip.id === '18_4';
                                                        if (isBackup && !showBackup) {
                                                            return (
                                                                <div key={idx} className="flex gap-3 p-1">
                                                                    <span className="text-[9px] font-mono py-0.5 h-4.5 min-w-[40px] border border-transparent text-center rounded font-bold text-transparent select-none">14:30</span>
                                                                    <button
                                                                        onClick={() => setShowBackup(true)}
                                                                        className="flex-1 py-1.5 px-3 border border-dashed border-[#767fa5]/40 rounded-lg text-center text-xs font-bold text-[#767fa5] bg-white/40 active:bg-white/80 hover:bg-white/60 transition-all flex items-center justify-center gap-1.5 shadow-2xs"
                                                                    >
                                                                        <Icon name="Sparkles" size={10} className="opacity-80" />
                                                                        備案
                                                                    </button>
                                                                </div>
                                                            );
                                                        }
                                                        return (
                                                            <div key={idx} className={`flex gap-3 text-[#646464] p-2 rounded-lg transition-colors ${isBackup ? 'border border-dashed border-[#767fa5]/30 bg-[#767fa5]/5 relative' : ''}`}>
                                                                <span className={`text-[9px] font-mono py-0.5 h-4.5 min-w-[40px] border text-center rounded font-bold shadow-2xs ${isFood ? 'bg-white border-2 border-[#cfd3f1] text-[#767fa5]' : 'bg-white border-[#eeeeee] text-[#767fa5]'}`}>{trip.startTime}</span>
                                                                <div className="flex-1 min-w-0">
                                                                    <div className="flex items-center gap-1.5 mb-0.5">
                                                                        <Icon name={trip.category || "Star"} size={11} className="text-[#767fa5]" />
                                                                        <p className="text-[12px] font-bold truncate text-[#646464]">{trip.name} {isBackup && <span className="text-[8px] bg-[#767fa5]/20 text-[#4d5370] px-1 py-0.2 rounded font-normal ml-1">備案</span>}</p>
                                                                        {isBackup && (
                                                                            <button
                                                                                onClick={() => setShowBackup(false)}
                                                                                className="ml-auto text-[9px] text-[#767fa5]/60 hover:text-[#767fa5] font-semibold"
                                                                                title="隱藏備案"
                                                                            >
                                                                                隱藏
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                    <p className="text-[9px] text-[#646464]/60 truncate font-medium flex items-center gap-1">
                                                                        <Icon name="MapPin" size={8} /> {trip.address}
                                                                    </p>
                                                                    {trip.note && (
                                                                        <p className="text-[11px] p-2.5 rounded-r-md mt-1.5 whitespace-pre-wrap leading-relaxed shadow-2xs font-normal border-l-2 bg-white border-[#767fa5] text-[#646464]">
                                                                            {trip.note}
                                                                        </p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {/* 2. 票券分頁 */}
                        {currentTab === 'tickets' && (
                            <div className="space-y-3">
                                {ticketsData.map((tk, i) => (
                                    <div key={i} className="bg-white border shadow-sm p-4 rounded-xl border-[#eeeeee] text-[#646464]">
                                        <div className="flex justify-between items-start mb-1.5">
                                            <span className="text-[8px] font-bold uppercase px-2 py-0.5 rounded bg-[#d7dce7] text-[#646464] border border-[#eeeeee]">{tk.type}</span>
                                            <span className="text-[10px] font-mono font-bold text-[#767fa5]">{tk.date}</span>
                                        </div>
                                        <p className="text-[13px] font-bold text-[#646464] leading-tight mb-1">{tk.title}</p>
                                        {tk.code && <p className="text-[10px] font-mono text-[#767fa5] font-bold bg-[#d7dce7]/30 px-2 py-0.5 rounded inline-block mt-1 tracking-wider">代號: {tk.code} ({tk.model})</p>}
                                        <p className="text-[11px] text-[#646464]/80 mt-2 bg-slate-50 p-2 rounded-lg border border-dashed border-[#eeeeee] leading-relaxed">{tk.notice}</p>
                                        {tk.url && (
                                            <button onClick={() => window.open(tk.url)} className="mt-2.5 w-full bg-white border border-[#767fa5] text-[#767fa5] py-1.5 rounded-lg text-[11px] font-bold flex items-center justify-center gap-1 active:bg-[#767fa5] active:text-white transition-all shadow-2xs">
                                                <Icon name="Link" size={10} /> 開啟專屬 Naver / KKday 連結
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                        {/* 3. 住宿分頁 */}
                        {currentTab === 'stay' && (
                            <div className="space-y-4">
                                {staysData.map((h, i) => (
                                    <div key={i} className="bg-white border border-[#eeeeee] p-4 rounded-xl shadow-sm text-[#646464]">
                                        <h4 className="font-bold text-[14px] flex items-center gap-1.5 mb-0.5 text-[#646464]"><Icon name="Hotel" size={13} className="text-[#767fa5]" /> {h.name}</h4>
                                        <p className="text-[10px] font-mono text-[#767fa5] mb-3 tracking-wide">{h.period}</p>
                                        <div className="grid grid-cols-2 gap-2 mb-3.5">
                                            <div className="bg-slate-50 p-2 rounded-md border border-[#eeeeee] text-center">
                                                <p className="text-[8px] font-bold uppercase text-slate-400 mb-0.5">Check-In</p><p className="text-xs font-bold text-[#646464]">{h.checkIn}</p>
                                            </div>
                                            <div className="bg-slate-50 p-2 rounded-md border border-[#eeeeee] text-center">
                                                <p className="text-[8px] font-bold uppercase text-slate-400 mb-0.5">Check-Out</p><p className="text-xs font-bold text-[#646464]">{h.checkOut}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-2 text-[11px]">
                                            <div className="flex items-center gap-1.5 text-[#767fa5] font-bold"><Icon name="Navigation" size={11} /> {h.distance}</div>
                                            <p className="bg-slate-50 p-2.5 rounded-lg border-l-2 border-[#eeeeee] text-[10px] text-[#646464]/90 leading-relaxed">💡 {h.note}</p>
                                        </div>
                                        {h.mapUrl && (
                                            <button onClick={() => window.open(h.mapUrl)} className="mt-3 w-full bg-[#767fa5] text-white py-2 rounded-lg text-[11px] font-bold flex items-center justify-center gap-1 active:opacity-90 transition-all shadow-xs">
                                                <Icon name="Map" size={12} /> 開啟 Naver Map 地圖導航
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                        {/* 4. 購物分頁 */}
                        {currentTab === 'shopping' && (
                            <div className="animate-fade-in">
                                <div className="bg-white border border-[#eeeeee] shadow-sm rounded-xl min-h-[440px] flex flex-col overflow-hidden text-[#646464]">
                                    <div className="grid grid-cols-3 gap-0.5 p-1 bg-slate-50 border-b border-[#eeeeee]">
                                        {['彩妝保養', '零食伴手禮', '潮流服飾'].map(cat => (
                                            <button key={cat} onClick={() => setActiveShopCategory(cat)} className={`py-1.5 text-[10px] font-bold rounded transition-all ${activeShopCategory === cat ? 'bg-[#767fa5] text-white shadow-xs' : 'text-[#646464]'}`}>{cat}</button>
                                        ))}
                                    </div>
                                    <div className="p-4 flex-1 flex flex-col">
                                        <h2 className="text-xs font-bold mb-3 tracking-wider flex items-center gap-2 text-[#767fa5]">
                                            <Icon name="ShoppingBag" size={12} /> {activeShopCategory} CHECKLIST
                                        </h2>
                                        <div className="flex-1 space-y-2 overflow-y-auto max-h-[250px] no-scrollbar px-0.5">
                                            {shoppingItems
                                                .filter(item => item.category === activeShopCategory)
                                                .sort((a, b) => a.purchased - b.purchased)
                                                .map(item => (
                                                    <div key={item.id} className="flex items-center gap-2 animate-fade-in">
                                                        <div className="flex-1 flex items-center justify-between p-3 bg-white border border-[#eeeeee] rounded-lg shadow-2xs overflow-hidden">
                                                            <div className="flex items-center gap-2.5 flex-1 overflow-hidden">
                                                                <button onClick={() => togglePurchased(item.id)} className={`w-4 h-4 border-2 border-[#767fa5] rounded-sm flex items-center justify-center shrink-0 transition-all ${item.purchased ? 'bg-[#767fa5]' : 'bg-white'}`}>
                                                                    {item.purchased && <Icon name="Check" size={10} className="text-white" />}
                                                                </button>
                                                                <div className="flex flex-col text-left truncate flex-1">
                                                                    <span className={`text-[12px] transition-all truncate ${item.purchased ? 'line-through opacity-35 italic text-[#646464]/60' : 'font-bold text-[#646464]'}`}>{item.name}</span>
                                                                    <span className="text-[9px] text-[#646464]/60 truncate">{item.intro} ({item.store})</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => deleteShopItem(item.id)} className="p-2 text-[#646464]/60 hover:text-red-500 transition-all bg-slate-50 rounded-lg border border-[#eeeeee]"><Icon name="X" size={11} /></button>
                                                    </div>
                                                ))}
                                        </div>
                                        <form onSubmit={handleAddShopItem} className="mt-3 flex gap-2 border-t border-[#eeeeee] pt-3">
                                            <input value={newShopItemName} onChange={e => setNewShopItemName(e.target.value)} placeholder={`新增至 ${activeShopCategory}...`} className="flex-1 bg-slate-50 border border-[#eeeeee] px-3 py-1.5 text-[11px] rounded-md outline-none focus:border-[#767fa5]" />
                                            <button type="submit" className="bg-[#767fa5] text-white px-4 rounded-md font-bold text-sm active:opacity-90">✢</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
